name: Generate GitHub Stats Cards

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub Stats SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: x11t200z
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Ho_Chi_Minh
          filename: github-stats.svg
          output_action: none
          config_display: large
          base_indepth: yes
          config_output: svg

      - name: Generate Top Languages SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: x11t200z
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: "0:00ff41, 1:00cc33, 2:009926, 3:006619, 4:00330c"
          plugin_languages_limit: 8
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          filename: github-top-langs.svg
          output_action: none
          config_output: svg

      - name: Move to dist
        run: |
          mkdir -p dist
          mv /metrics_renders/github-stats.svg dist/
          mv /metrics_renders/github-top-langs.svg dist/

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          keep_history: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
